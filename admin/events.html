<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events | FTLuma Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="../supabase-config.js"></script>
    <link rel="stylesheet" href="../style.css">
    <script type="module">
        (async () => {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                if (!session || error) window.location.href = '/admin';
            } catch (err) { window.location.href = '/admin'; }
        })();
    </script>
    <style>
        .admin-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; background: #050a14; }
        .admin-sidebar { background: var(--bg-surface); border-right: 1px solid var(--border-color); padding: 2rem; display: flex; flex-direction: column; gap: 2rem; position: sticky; top: 0; height: 100vh; z-index: 10; }
        .admin-nav { display: flex; flex-direction: column; gap: 0.5rem; }
        .admin-nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: var(--text-secondary); font-weight: 500; transition: all 0.3s ease; margin-bottom: 4px; text-decoration: none; }
        .admin-nav-link:hover { background: var(--glass-bg); color: var(--text-primary); }
        .admin-nav-link.active { background: rgba(0, 255, 163, 0.1); color: #00ffa3; font-weight: 600; }
        .admin-main { padding: 40px 60px; width: 100%; margin: 0; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        
        .events-table-container { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--border-radius-lg); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); color: var(--text-secondary); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255, 255, 255, 0.02); }

        .event-info { display: flex; align-items: center; gap: 1rem; }
        .event-info img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #000; border: 1px solid var(--border-color); }
        .event-title { font-weight: 600; color: var(--text-primary); display: block; }
        .event-location-text { font-size: 0.75rem; color: var(--color-primary); font-weight: 600; text-transform: uppercase; }

        .action-btns { display: flex; gap: 0.5rem; }
        .action-btn { background: none; border: 1px solid var(--border-color); color: var(--text-secondary); padding: 8px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { border-color: var(--text-primary); color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
        .action-btn.delete:hover { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.05); }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 20px; padding: 2.5rem; width: 600px; max-width: 90%; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.5rem; }
        
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-primary); font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.75rem 1rem; border-radius: 8px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border-color); color: var(--text-primary); outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--color-primary); }
        .form-group textarea { height: 100px; resize: vertical; }

        .image-upload-field { position: relative; border: 2px dashed var(--border-color); border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s ease; }
        .image-upload-field:hover { border-color: var(--color-primary); background: rgba(0, 255, 163, 0.05); }
        .image-upload-field i { font-size: 2rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .image-upload-preview { margin-top: 1rem; border-radius: 8px; overflow: hidden; display: none; border: 1px solid var(--border-color); }
        .image-upload-preview img { width: 100%; height: 150px; object-fit: cover; }
        .hidden { display: none; }
        
        .logout { margin-top: auto; color: #f87171 !important; }
        #loading-state { padding: 2rem; text-align: center; }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="/" class="logo">FTLuma<span class="dot">.</span></a>
            <nav class="admin-nav">
                <a href="/admin/articles" class="admin-nav-link">
                    <i class="ph ph-article"></i> All Articles
                </a>
                <a href="/admin/dashboard" class="admin-nav-link">
                    <i class="ph ph-plus-circle"></i> New Article
                </a>
                <a href="/admin/authors" class="admin-nav-link">
                    <i class="ph ph-users"></i> Authors
                </a>
                <a href="/admin/events" class="admin-nav-link active">
                    <i class="ph ph-calendar"></i> Events
                </a>
                <a href="/admin/settings" class="admin-nav-link">
                    <i class="ph ph-gear"></i> Settings
                </a>
                <a href="#" onclick="handleLogout()" class="admin-nav-link logout">
                    <i class="ph ph-sign-out"></i> Logout
                </a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div>
                    <h1>Manage Events</h1>
                    <p>Schedule and coordinate upcoming training sessions.</p>
                </div>
                <button class="btn btn-primary" onclick="openEventModal()">
                    <i class="ph ph-calendar-plus"></i> Add New Event
                </button>
            </header>

            <div class="events-table-container glass-panel">
                <table id="events-table">
                    <thead>
                        <tr>
                            <th>Event Details</th>
                            <th>Date & Time</th>
                            <th>Badge</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="events-list">
                        <!-- Content via JS -->
                    </tbody>
                </table>
                <div id="loading-state">
                    <i class="ph ph-circle-notch loading-icon spin"></i>
                    <p class="loading-text">Fetching events list...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay" id="event-modal">
        <div class="modal-content glass-panel">
            <button class="modal-close" onclick="closeEventModal()"><i class="ph ph-x"></i></button>
            <h2 id="modal-title">Add New Event</h2>
            <form id="event-form" onsubmit="handleEventSubmit(event)">
                <input type="hidden" id="event-id">
                
                <div class="form-group">
                    <label for="event-title">Event Title</label>
                    <input type="text" id="event-title" required placeholder="e.g. Budgeting Masterclass">
                </div>

                <div class="form-group">
                    <label for="event-date">Date & Time</label>
                    <input type="datetime-local" id="event-date" required>
                </div>

                <div class="form-group">
                    <label for="event-badge">Date Badge Text (Optional)</label>
                    <input type="text" id="event-badge" placeholder="e.g. APR 28 (Autogenerated if empty)">
                </div>

                <div class="form-group">
                    <label for="event-location">Location</label>
                    <input type="text" id="event-location" required value="Virtual Session">
                </div>

                <div class="form-group">
                    <label>Featured Image</label>
                    <div class="image-upload-field" onclick="document.getElementById('event-image-file').click()">
                        <i class="ph ph-image"></i>
                        <p id="upload-label">Click to upload image</p>
                        <input type="file" id="event-image-file" class="hidden" accept="image/*">
                        <input type="hidden" id="event-image-url">
                    </div>
                    <div id="image-preview-box" class="image-upload-preview">
                        <img id="image-preview-img" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-group">
                    <label for="event-description">Description</label>
                    <textarea id="event-description" required placeholder="Tell participants what they will learn..."></textarea>
                </div>

                <div class="form-group">
                    <label for="event-reg-url">Registration URL</label>
                    <input type="url" id="event-reg-url" placeholder="https://zoom.us/j/...">
                </div>

                <div class="form-group">
                    <label for="event-btn-text">Button Text</label>
                    <input type="text" id="event-btn-text" value="Register for Free">
                </div>

                <button type="submit" class="btn btn-primary w-full" id="submit-btn">Save Event</button>
            </form>
        </div>
    </div>

    <script type="module">
        let currentEvents = [];

        async function fetchEvents() {
            const loading = document.getElementById('loading-state');
            const list = document.getElementById('events-list');
            
            try {
                const { data, error } = await supabase
                    .from('events')
                    .select('*')
                    .order('event_date', { ascending: true });

                loading.style.display = 'none';

                if (error) {
                    list.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #ef4444;">Error: ${error.message}</td></tr>`;
                    return;
                }

                currentEvents = data;
                renderEventsTable(data);
            } catch (err) {
                loading.style.display = 'none';
                list.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #ef4444;">Error: ${err.message}</td></tr>`;
            }
        }

        function renderEventsTable(events) {
            const list = document.getElementById('events-list');
            if (events.length === 0) {
                list.innerHTML = `<tr><td colspan="5" style="text-align:center;">No upcoming events found.</td></tr>`;
                return;
            }

            list.innerHTML = events.map(event => {
                const date = new Date(event.event_date);
                const badge = event.badge_text || date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
                
                return `
                    <tr>
                        <td>
                            <div class="event-info">
                                <img src="${event.image_url || '../images/post-hero.png'}" alt="${event.title}">
                                <span class="event-title">${event.title}</span>
                            </div>
                        </td>
                        <td style="font-size: 0.85rem; color: var(--text-secondary);">
                            ${date.toLocaleDateString()} at ${date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                        </td>
                        <td><span class="tag">${badge}</span></td>
                        <td><span class="event-location-text"><i class="ph ph-video-camera"></i> ${event.location}</span></td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn" onclick="editEvent('${event.id}')" title="Edit"><i class="ph ph-pencil-simple"></i></button>
                                <button class="action-btn delete" onclick="deleteEvent('${event.id}')" title="Delete"><i class="ph ph-trash"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function handleEventSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('event-id').value;
            const eventData = {
                title: document.getElementById('event-title').value,
                description: document.getElementById('event-description').value,
                event_date: document.getElementById('event-date').value,
                badge_text: document.getElementById('event-badge').value,
                location: document.getElementById('event-location').value,
                image_url: document.getElementById('event-image-url').value,
                registration_url: document.getElementById('event-reg-url').value,
                button_text: document.getElementById('event-btn-text').value
            };

            let result;
            if (id) {
                result = await supabase.from('events').update(eventData).eq('id', id);
            } else {
                result = await supabase.from('events').insert([eventData]);
            }

            if (result.error) {
                alert('Error: ' + result.error.message);
                return;
            }

            closeEventModal();
            fetchEvents();
        }

        window.openEventModal = function(id = null) {
            const modal = document.getElementById('event-modal');
            const title = document.getElementById('modal-title');
            const submitBtn = document.getElementById('submit-btn');
            const form = document.getElementById('event-form');
            
            form.reset();
            document.getElementById('event-id').value = id || '';
            document.getElementById('event-image-url').value = '';
            document.getElementById('image-preview-box').style.display = 'none';
            document.getElementById('upload-label').textContent = 'Click to upload image';
            
            if (id) {
                const event = currentEvents.find(e => e.id === id);
                if (event) {
                    title.textContent = 'Edit Event';
                    submitBtn.textContent = 'Update Event';
                    document.getElementById('event-title').value = event.title;
                    document.getElementById('event-description').value = event.description;
                    // Format date for datetime-local input
                    const d = new Date(event.event_date);
                    const formattedDate = d.toISOString().slice(0, 16);
                    document.getElementById('event-date').value = formattedDate;
                    document.getElementById('event-badge').value = event.badge_text || '';
                    document.getElementById('event-location').value = event.location;
                    document.getElementById('event-image-url').value = event.image_url;
                    document.getElementById('event-reg-url').value = event.registration_url || '';
                    document.getElementById('event-btn-text').value = event.button_text || 'Register for Free';
                    if (event.image_url) showImagePreview(event.image_url);
                }
            } else {
                title.textContent = 'Add New Event';
                submitBtn.textContent = 'Save Event';
            }
            
            modal.classList.add('active');
        };

        async function uploadImage(file) {
            const ext = file.name.split('.').pop();
            const fileName = `events/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
            const { data, error } = await supabase.storage
                .from('article-images')
                .upload(fileName, file, { cacheControl: '3600', upsert: false });
            if (error) throw error;
            const { data: urlData } = supabase.storage.from('article-images').getPublicUrl(fileName);
            return urlData.publicUrl;
        }

        function showImagePreview(src) {
            const box = document.getElementById('image-preview-box');
            const img = document.getElementById('image-preview-img');
            const label = document.getElementById('upload-label');
            img.src = src;
            box.style.display = 'block';
            label.textContent = 'Change image';
        }

        document.getElementById('event-image-file').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const label = document.getElementById('upload-label');
            const originalText = label.textContent;
            label.textContent = 'Uploading...';

            try {
                const url = await uploadImage(file);
                document.getElementById('event-image-url').value = url;
                showImagePreview(url);
                label.textContent = 'Uploaded successfully!';
            } catch (err) {
                alert('Upload failed: ' + err.message);
                label.textContent = originalText;
            }
        });

        window.closeEventModal = function() {
            document.getElementById('event-modal').classList.remove('active');
        };

        window.editEvent = function(id) {
            window.openEventModal(id);
        };

        window.deleteEvent = async function(id) {
            if (!confirm('Are you sure you want to delete this event?')) return;
            const { error } = await supabase.from('events').delete().eq('id', id);
            if (error) {
                alert('Error: ' + error.message);
                return;
            }
            fetchEvents();
        };

        window.handleLogout = async function() {
            await supabase.auth.signOut();
            window.location.href = '/admin';
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', fetchEvents);
        } else {
            fetchEvents();
        }

        window.handleEventSubmit = handleEventSubmit;
    </script>
</body>
</html>
